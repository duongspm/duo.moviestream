<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <script src="js/themeManager.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phim Yêu Thích Của Bạn - Duoflix</title>
  <meta name="robots" content="noindex, follow" />

  <!-- ===== Favicon & App Icons ===== -->
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180x180.png" />
  <link rel="mask-icon" href="assets/safari-pinned-tab.svg" color="#e0263f" />
  <link rel="manifest" href="assets/site.webmanifest" />
  <meta name="theme-color" content="#060608" />
  <meta property="og:title"
    content="Danh sách Phim yêu thích - Duoflix | Chiếc web xem phim tự code chạy bằng cơm, không pop-up, không quảng cáo  , không trị xương khớp. Chỉ có phim hay, giao diện mượt và sự yên bình cho tâm hồn Gen Z sau giờ chạy deadline."
    id="og-title" />
  <meta property="og:description"
    content="Thông tin Danh sách phim yêu thích: nội dung, diễn viên, đạo diễn, danh sách tập. Chiếc web xem phim tự code chạy bằng cơm, không pop-up, không quảng cáo  , không trị xương khớp. Chỉ có phim hay, giao diện mượt và sự yên bình cho tâm hồn Gen Z sau giờ chạy deadline."
    id="og-description" />
  <meta property="og:type" content="video.movie" />
  <meta property="og:image" content="https://duo-flix.vercel.app/assets/ogp.png" id="og-image" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:locale" content="vi_VN" />
  <meta property="og:site_name" content="Duoflix" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/movie-card.css" />
  <link rel="stylesheet" href="css/filter.css" />
  <link rel="stylesheet" href="css/footer.css" />

  <style>
    /* CSS riêng nhỏ cho trang favorites - không đủ lớn để tách file riêng */
    .favorite-card {
      position: relative;
    }

    .favorite-remove-btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.45rem;
      font-size: var(--fs-tiny);
      font-weight: 600;
      color: var(--text-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      transition: var(--transition-fast);
    }

    .favorite-remove-btn:hover {
      color: var(--accent-red);
      border-color: var(--accent-red);
    }

    /* Tabs chuyển giữa Yêu thích / Đang xem dở */
    .fav-tabs {
      display: flex;
      gap: 0.6rem;
      margin-bottom: var(--space-md);
    }

    .fav-tab {
      padding: 0.55rem 1.1rem;
      border-radius: var(--radius-pill);
      font-size: var(--fs-small);
      font-weight: 700;
      color: var(--text-secondary);
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      transition: var(--transition-fast);
    }

    .fav-tab.active {
      background: var(--accent-red);
      border-color: var(--accent-red);
      color: #fff;
    }

    .fav-tab:hover:not(.active) {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }

    .fav-tab-panel {
      display: none;
    }

    .fav-tab-panel.active {
      display: block;
    }

    /* Card "đang xem dở" - có progress bar giống Continue Watching ở trang chủ */
    .watching-card {
      position: relative;
    }

    .watching-progress-track {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 5px;
      background: rgba(255, 255, 255, 0.18);
    }

    .watching-progress-fill {
      height: 100%;
      background: var(--accent-red);
      box-shadow: 0 0 8px rgba(224, 38, 63, 0.6);
    }

    .favorite-nav-link {
      color: var(--accent-red);
      background: rgba(224, 38, 63, 0.1);
    }

    .favorite-nav-link svg path {
      fill: #e0263f;
      stroke: var(--accent-gold);
    }
  </style>
</head>

<body>
  <script src="js/pageTransition.js"></script>
  <div id="page-loader" class="page-loader">
    <div class="page-loader-logo">
      DUO<span>FLIX</span>
    </div>
    <div class="page-loader-bar-track">
      <div class="page-loader-bar-fill"></div>
    </div>
  </div>
  <script src="js/pageLoader.js"></script>

  <div id="site-header"></div>

  <main class="filter-page">
    <div class="container">
      <div class="filter-hero">
        <h1>Phim Của Bạn</h1>
        <p>Danh sách này lưu trên trình duyệt này (☝️chỉ lưu trên thiết bị của bạn) - đổi máy hoặc xoá cache sẽ mất dữ
          liệu.</p>
      </div>

      <div class="fav-tabs">
        <button class="fav-tab active" data-tab="favorites">Yêu Thích</button>
        <button class="fav-tab" data-tab="watching">Đang Xem Dở</button>
      </div>

      <div class="fav-tab-panel active" id="panel-favorites">
        <div class="movie-grid" id="favorites-grid"></div>
        <div class="empty-block" id="favorites-empty" hidden>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
            </path>
          </svg>
          <p>Bạn chưa có phim yêu thích nào.</p>
          <a href="index.html" class="btn btn-primary">Khám phá phim ngay</a>
        </div>
      </div>

      <div class="fav-tab-panel" id="panel-watching">
        <div class="movie-grid" id="watching-grid"></div>
        <div class="empty-block" id="watching-empty" hidden>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <p>Bạn chưa xem dở phim nào.</p>
          <a href="index.html" class="btn btn-primary">Khám phá phim ngay</a>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <button id="scroll-top-btn" class="scroll-top-btn" aria-label="Lên đầu trang" hidden>
    <svg class="scroll-top-ring" viewBox="0 0 44 44">
      <circle class="scroll-top-ring-bg" cx="22" cy="22" r="19"></circle>
      <circle class="scroll-top-ring-fill" cx="22" cy="22" r="19"></circle>
    </svg>
    <span class="scroll-top-arrow">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </span>
    <span class="scroll-top-percent" id="scroll-top-percent">0%</span>
  </button>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/services/httpClient.js"></script>
  <script src="js/services/movieService.js"></script>
  <script src="js/services/storageService.js"></script>

  <script src="js/components/header.js"></script>
  <script src="js/components/footer.js"></script>

  <script src="js/pages/favorites.js"></script>
  <script src="js/scrollTop.js"></script>

</body>

</html>
