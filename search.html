<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <script src="js/themeManager.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tìm Kiếm Phim - Duoflix</title>
  <meta name="robots" content="noindex, follow" />

  <!-- ===== Favicon & App Icons ===== -->
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180x180.png" />
  <link rel="mask-icon" href="assets/safari-pinned-tab.svg" color="#e0263f" />
  <link rel="manifest" href="assets/site.webmanifest" />
  <meta name="theme-color" content="#060608" />

  <!-- ===== Open Graph / SEO xã hội ===== -->
  <meta property="og:title" content="Tìm Kiếm Phim - Duoflix" />
  <meta property="og:description"
    content="Tìm kiếm phim nhanh theo tên - Vietsub, Thuyết minh, Lồng tiếng. | Chiếc web xem phim tự code chạy bằng cơm, không pop-up, không quảng cáo  , không trị xương khớp. Chỉ có phim hay, giao diện mượt và sự yên bình cho tâm hồn Gen Z sau giờ chạy deadline." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://duo-moviestream.vercel.app/assets/ogp-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="vi_VN" />
  <meta property="og:site_name" content="Duoflix" />

  <!-- ===== Twitter Card ===== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Tìm Kiếm Phim - Duoflix" />
  <meta name="twitter:image" content="https://duo-moviestream.vercel.app/assets/ogp-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/movie-card.css" />
  <link rel="stylesheet" href="css/filter.css" />
  <link rel="stylesheet" href="css/footer.css" />
</head>

<body>
  <script src="js/pageTransition.js"></script>
  <div id="page-loader" class="page-loader">
    <div class="page-loader-logo">
      DUO<span>FLIX</span>
    </div>
    <div class="page-loader-bar-track">
      <div class="page-loader-bar-fill"></div>
    </div>
  </div>
  <script src="js/pageLoader.js"></script>

  <div id="site-header"></div>

  <main class="filter-page">
    <div class="container">
      <div class="filter-hero">
        <h1 id="search-heading">Tìm Kiếm Phim</h1>
      </div>

      <form id="search-page-form" class="filter-bar" style="gap:0.6rem;">
        <input id="search-page-input" type="text" placeholder="Nhập tên phim cần tìm..."
          style="flex:1; min-width:200px; background:var(--bg-surface-2); padding:0.6rem 1rem; border-radius:var(--radius-sm); color:var(--text-primary); border:1px solid var(--border-subtle);" />
        <button type="submit" class="btn btn-primary">Tìm kiếm</button>
      </form>

      <p class="filter-results-info" id="search-info"></p>

      <div class="movie-grid" id="search-grid"></div>

      <div class="pagination" id="search-pagination"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <button id="scroll-top-btn" class="scroll-top-btn" aria-label="Lên đầu trang" hidden>
    <svg class="scroll-top-ring" viewBox="0 0 44 44">
      <circle class="scroll-top-ring-bg" cx="22" cy="22" r="19"></circle>
      <circle class="scroll-top-ring-fill" cx="22" cy="22" r="19"></circle>
    </svg>
    <span class="scroll-top-arrow">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </span>
    <span class="scroll-top-percent" id="scroll-top-percent">0%</span>
  </button>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/services/httpClient.js"></script>
  <script src="js/services/movieService.js"></script>

  <script src="js/components/header.js"></script>
  <script src="js/components/footer.js"></script>
  <script src="js/components/movieCard.js"></script>

  <script src="js/pages/search.js"></script>
  <script src="js/scrollTop.js"></script>

</body>

</html>
